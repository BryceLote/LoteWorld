<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body &amp; Mind — Bryce Lote</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1d21;--bg-card:#212428;--bg-surface:#272a2f;
    --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
    --text-heading:#e8e5de;--text-body:#908b82;--text-muted:#5a5750;--text-faint:#3a3630;
    --rust:#9e6b47;--sage:#7a8a6e;--quiet-blue:#6e7f8a;--clay:#a89279;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-body);line-height:1.7;font-size:17px;-webkit-font-smoothing:antialiased}

  nav{position:fixed;top:0;width:100%;padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(26,29,33,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-name{font-family:'Libre Baskerville',serif;font-size:1.1rem;color:var(--text-heading);letter-spacing:0.02em;text-decoration:none}
  .nav-links{display:flex;gap:2.5rem;align-items:center}
  .nav-links a{font-size:0.9rem;color:var(--text-heading);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;font-weight:400}
  .nav-links a:hover{opacity:0.7}
  .nav-dropdown{position:relative}
  .nav-dropdown-trigger{font-size:0.9rem;color:var(--text-heading);text-decoration:none;letter-spacing:0.04em;transition:color 0.3s;font-weight:400;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
  .nav-dropdown-trigger:hover{opacity:0.7}
  .nav-dropdown-trigger::after{content:'';display:inline-block;width:5px;height:5px;border-right:1px solid var(--text-muted);border-bottom:1px solid var(--text-muted);transform:rotate(45deg);margin-left:0.4rem;position:relative;top:-2px;transition:transform 0.3s}
  .nav-dropdown.open .nav-dropdown-trigger::after{transform:rotate(-135deg);top:1px}
  .nav-dropdown-menu{position:absolute;top:calc(100% + 0.75rem);right:0;background:var(--bg-surface);backdrop-filter:blur(12px);border:1px solid var(--border-hover);padding:0.5rem 0;min-width:180px;opacity:0;visibility:hidden;transform:translateY(-4px);transition:opacity 0.25s ease,transform 0.25s ease,visibility 0.25s;box-shadow:0 8px 24px rgba(0,0,0,0.3)}
  .nav-dropdown-menu a{display:block;padding:0.5rem 1.25rem;font-size:0.88rem;color:var(--text-heading);text-decoration:none;letter-spacing:0.03em;transition:color 0.2s,background 0.2s}
  .nav-dropdown-menu a:hover{background:rgba(255,255,255,0.04)}
  @media(hover:hover){.nav-dropdown:hover .nav-dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}}
  .nav-dropdown.open .nav-dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}

  .page-header{padding:9rem 3rem 3rem;max-width:900px;margin:0 auto}
  .page-header h1{font-family:'Libre Baskerville',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:400;color:var(--text-heading);line-height:1.3;margin-bottom:1.25rem;opacity:0;animation:fadeUp 0.8s ease 0.2s forwards}
  .page-header p{font-size:1rem;color:var(--text-body);max-width:520px;line-height:1.8;opacity:0;animation:fadeUp 0.8s ease 0.5s forwards}
  .page-header-line{width:48px;height:1px;background:var(--text-faint);margin-top:2.5rem;opacity:0;animation:fadeUp 0.8s ease 0.7s forwards}

  .filter-bar{max-width:900px;margin:0 auto;padding:0 3rem;display:flex;align-items:center;gap:0.75rem}
  .filter-label{font-size:0.75rem;color:var(--text-muted);letter-spacing:0.08em}
  .filter-dropdown{position:relative}
  .filter-trigger{font-family:inherit;font-size:0.85rem;color:var(--text-heading);background:var(--bg-card);border:1px solid var(--border);padding:0.4rem 0.9rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;transition:border-color 0.3s}
  .filter-trigger:hover{border-color:var(--border-hover)}
  .filter-trigger::after{content:'';display:inline-block;width:5px;height:5px;border-right:1px solid var(--text-muted);border-bottom:1px solid var(--text-muted);transform:rotate(45deg);position:relative;top:-1px;transition:transform 0.3s}
  .filter-dropdown.open .filter-trigger::after{transform:rotate(-135deg);top:2px}
  .filter-menu{position:absolute;top:calc(100% + 0.4rem);left:0;background:var(--bg-surface);border:1px solid var(--border-hover);padding:0.35rem 0;min-width:150px;opacity:0;visibility:hidden;transform:translateY(-4px);transition:opacity 0.2s ease,transform 0.2s ease,visibility 0.2s;box-shadow:0 8px 24px rgba(0,0,0,0.3);z-index:50}
  .filter-dropdown.open .filter-menu{opacity:1;visibility:visible;transform:translateY(0)}
  .filter-option{display:block;width:100%;font-family:inherit;font-size:0.85rem;color:var(--text-body);background:none;border:none;padding:0.4rem 1rem;text-align:left;cursor:pointer;transition:color 0.2s,background 0.2s}
  .filter-option:hover{color:var(--text-heading);background:rgba(255,255,255,0.04)}
  .filter-option.active{color:var(--text-heading)}

  .card-grid{max-width:900px;margin:0 auto;padding:2rem 3rem 4rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  .bm-card{background:var(--bg-card);border:1px solid var(--border);display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s;overflow:hidden}
  .bm-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.2);border-color:var(--border-hover)}
  .bm-card.hidden{display:none}
  .card-image{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-bottom:1px solid var(--border)}
  .card-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
  .card-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem}
  .card-tag{display:inline-block;font-size:0.7rem;color:var(--text-muted);letter-spacing:0.1em;border:1px solid var(--border-hover);padding:0.15rem 0.5rem}
  .card-title{font-family:'Libre Baskerville',serif;font-size:1.15rem;font-weight:400;color:var(--text-heading);line-height:1.4;margin-bottom:0.75rem}
  .card-desc{font-size:0.9rem;color:var(--text-body);line-height:1.7;flex:1}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
  .card-date{font-size:0.75rem;color:var(--text-muted);letter-spacing:0.08em}
  .card-link{font-size:0.85rem;color:var(--text-body);transition:color 0.3s}
  .bm-card:hover .card-link{color:var(--text-heading)}
  .card-link span{margin-left:0.3rem;display:inline-block;transition:transform 0.3s}
  .bm-card:hover .card-link span{transform:translateX(3px)}

  .back-section{max-width:900px;margin:0 auto;padding:0 3rem 4rem}
  .back-link{display:inline-block;font-size:0.85rem;color:var(--text-muted);text-decoration:none;transition:color 0.3s;letter-spacing:0.03em}
  .back-link:hover{color:var(--text-heading)}
  .back-link span{margin-right:0.4rem;transition:transform 0.3s;display:inline-block}
  .back-link:hover span{transform:translateX(-3px)}

  footer{padding:4rem 3rem;max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--border)}
  .footer-left{font-family:'Libre Baskerville',serif;font-size:0.95rem;color:var(--text-body)}
  .footer-left small{display:block;margin-top:0.5rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;color:var(--text-muted)}
  .footer-right{font-size:0.8rem;color:var(--text-muted);display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem}
  .footer-right a{color:var(--text-muted);text-decoration:none;transition:color 0.3s}
  .footer-right a:hover{color:var(--text-heading)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{opacity:0;transform:translateY(12px);transition:opacity 0.6s ease,transform 0.6s ease}
  .fade-in.visible{opacity:1;transform:translateY(0)}

  @media(max-width:768px){
    nav{padding:1.2rem 1.5rem}.nav-links{gap:1.5rem}.nav-links a{font-size:0.8rem}
    .page-header{padding:7rem 1.5rem 2rem}
    .card-grid{grid-template-columns:1fr;padding:2rem 1.5rem 3rem}
    .filter-bar{padding:0 1.5rem}
    .back-section{padding:0 1.5rem 3rem}
    footer{flex-direction:column;gap:1.5rem;padding:3rem 1.5rem}
  }
</style>
</head>
<body>

<nav>
  <a href="/index.html" class="nav-name">Bryce Lote</a>
  <div class="nav-links">
    <a href="/index.html">Home</a>
    <div class="nav-dropdown">
      <a href="/index.html#work" class="nav-dropdown-trigger" onclick="if(window.innerWidth > 768) return true; event.preventDefault(); this.parentElement.classList.toggle('open');">Everything</a>
      <div class="nav-dropdown-menu">
        <a href="/pages/writing.html">Writing</a>
        <a href="/pages/breakdowns.html">Breakdowns</a>
        <a href="/pages/faith-family.html">Faith &amp; Family</a>
        <a href="/pages/library.html">Library</a>
        <a href="/pages/games.html">Games</a>
      </div>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Body &amp; Mind</h1>
  <p>What I'm learning about how to take care of myself.</p>
  <div class="page-header-line"></div>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <div class="filter-dropdown">
    <button class="filter-trigger">All</button>
    <div class="filter-menu" id="filter-menu"></div>
  </div>
</div>

<div class="card-grid" id="card-grid"></div>

<div class="back-section">
  <a href="/index.html" class="back-link"><span>&larr;</span> back home</a>
</div>

<footer>
  <div class="footer-left">Bryce Lote<small>Yukon, Oklahoma</small></div>
  <div class="footer-right">
    <a href="https://www.linkedin.com/in/bryce-lote/">LinkedIn</a>
    <a href="https://www.facebook.com/bryce.lote">Facebook</a>
    <a href="https://www.instagram.com/Handsome_bryce">Instagram</a>
  </div>
</footer>

<script>
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  document.addEventListener('click', function(e) {
    var navDropdown = document.querySelector('.nav-dropdown');
    if (navDropdown && !navDropdown.contains(e.target)) navDropdown.classList.remove('open');
  });

  fetch('/data/body-mind.json')
    .then(function(r) { return r.json(); })
    .then(function(entries) {
      var grid = document.getElementById('card-grid');
      var filterMenu = document.getElementById('filter-menu');
      var allTags = [];

      entries.sort(function(a, b) { return b.date_sort.localeCompare(a.date_sort); });

      entries.forEach(function(entry, i) {
        var card = document.createElement('a');
        card.className = 'bm-card fade-in';
        card.href = entry.url;
        card.setAttribute('data-tags', entry.tags.join(','));
        card.style.transitionDelay = (0.05 + i * 0.05) + 's';

        var html = '';
        if (entry.image) html += '<img class="card-image" src="' + entry.image + '" alt="' + entry.title + '">';
        html += '<div class="card-body"><div class="card-tags">';
        entry.tags.forEach(function(tag) {
          html += '<div class="card-tag">' + tag.charAt(0).toUpperCase() + tag.slice(1) + '</div>';
          if (allTags.indexOf(tag) === -1) allTags.push(tag);
        });
        html += '</div>';
        html += '<div class="card-title">' + entry.title + '</div>';
        html += '<div class="card-desc">' + entry.description + '</div>';
        html += '<div class="card-footer"><span class="card-date">' + entry.date + '</span>';
        html += '<span class="card-link">' + entry.link_text + ' <span>&rarr;</span></span></div></div>';

        card.innerHTML = html;
        grid.appendChild(card);
        observer.observe(card);
        card.classList.add('visible');
      });

      var allBtn = document.createElement('button');
      allBtn.className = 'filter-option active';
      allBtn.setAttribute('data-filter', 'all');
      allBtn.textContent = 'All';
      filterMenu.appendChild(allBtn);

      allTags.forEach(function(tag) {
        var btn = document.createElement('button');
        btn.className = 'filter-option';
        btn.setAttribute('data-filter', tag);
        btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
        filterMenu.appendChild(btn);
      });

      var filterDropdown = document.querySelector('.filter-dropdown');
      var filterTrigger = document.querySelector('.filter-trigger');

      filterTrigger.addEventListener('click', function() { filterDropdown.classList.toggle('open'); });

      document.addEventListener('click', function(e) {
        if (!filterDropdown.contains(e.target)) filterDropdown.classList.remove('open');
      });

      filterMenu.addEventListener('click', function(e) {
        var option = e.target.closest('.filter-option');
        if (!option) return;
        var filter = option.getAttribute('data-filter');
        filterMenu.querySelectorAll('.filter-option').forEach(function(opt) { opt.classList.remove('active'); });
        option.classList.add('active');
        filterTrigger.textContent = option.textContent;
        grid.querySelectorAll('.bm-card').forEach(function(card) {
          var cardTags = card.getAttribute('data-tags').split(',');
          if (filter === 'all' || cardTags.indexOf(filter) !== -1) card.classList.remove('hidden');
          else card.classList.add('hidden');
        });
        filterDropdown.classList.remove('open');
      });
    });
</script>

<script src="/assets/js/content.js"></script>
<script src="/assets/js/search.js"></script>
</body>
</html>
